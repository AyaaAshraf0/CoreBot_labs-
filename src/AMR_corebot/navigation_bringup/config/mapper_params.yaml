slam_toolbox:
  ros__parameters:
    # --- frames ---
    odom_frame:      odom
    map_frame:       map
    base_frame:      base_link

    # --- input ---
    scan_topic:      /scan          # LD06 publishes here
    use_scan_matching: true

    # --- timing ---
    transform_publish_period:  0.03   # 50 Hz TF
    map_update_interval:       1.0    # seconds between map updates

    # --- resolution ---
    resolution:        0.05          # 5 cm/cell
    min_laser_range: 0.1
    max_laser_range:   12.0          # LD06 max ~12 m

    # --- async-specific ---
    throttle_scans:    1             # process every scan
    minimum_travel_distance: 0.1    # m before accepting new scan
    minimum_travel_heading:  0.1    # rad

    # --- loop closure ---
    loop_search_maximum_distance: 3.0
    do_loop_closing: true

    # --- sim time ---
    use_sim_time: false